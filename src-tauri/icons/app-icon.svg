<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141A24"/>
      <stop offset="100%" stop-color="#0A0E12"/>
    </linearGradient>
    <linearGradient id="mark" x1="300" y1="240" x2="760" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8A7BFF"/>
      <stop offset="100%" stop-color="#2F7DFF"/>
    </linearGradient>
  </defs>

  <!-- App tile background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- SynCatch mark: a clean, symmetric stopwatch (crown + side buttons + sweep hand)
       in a single purple→blue brand gradient — signals a focus / time-tracking tool.
       Geometry on a 100 canvas, scaled ×8 and centered on the 1024 tile. -->
  <g transform="translate(112, 112) scale(8)">
    <!-- Side buttons (symmetric) -->
    <line x1="30.7" y1="32" x2="26.2" y2="26.7" stroke="url(#mark)" stroke-width="5" stroke-linecap="round"/>
    <line x1="69.3" y1="32" x2="73.8" y2="26.7" stroke="url(#mark)" stroke-width="5" stroke-linecap="round"/>
    <!-- Crown -->
    <rect x="45.5" y="11" width="9" height="12" rx="3" fill="url(#mark)"/>
    <!-- Watch body -->
    <circle cx="50" cy="55" r="28" fill="none" stroke="url(#mark)" stroke-width="9"/>
    <!-- Sweep hand + hub -->
    <line x1="50" y1="55" x2="57.5" y2="42" stroke="url(#mark)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="50" cy="55" r="4.5" fill="url(#mark)"/>
  </g>
</svg>
