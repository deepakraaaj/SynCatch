<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141A24"/>
      <stop offset="100%" stop-color="#0A0E12"/>
    </linearGradient>
    <linearGradient id="mark" x1="300" y1="240" x2="760" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8A7BFF"/>
      <stop offset="100%" stop-color="#2F7DFF"/>
    </linearGradient>
  </defs>

  <!-- App tile background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- SynCatch mark: a clean check-loop design.
       Geometry on a 100 canvas, scaled ×8 and centered on the 1024 tile. -->
  <g transform="translate(112, 112) scale(8)">
    <!-- Outer crescent ring with breakout gap at top-right -->
    <path 
      d="M 50 18 A 32 32 0 1 0 82 50" 
      stroke="url(#mark)" 
      stroke-width="8.5" 
      stroke-linecap="round" 
    />
    
    <!-- Bold checkmark breaking out of the gap -->
    <path 
      d="M 38 52 L 47 61 L 76 32" 
      stroke="url(#mark)" 
      stroke-width="8.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
  </g>
</svg>
