<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1" />
  <meta name="theme-color" content="#060A0C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MissionControl" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="MissionControl — The desktop workspace that keeps you locked in." />
  <meta name="format-detection" content="telephone=no" />
  <meta name="format-detection" content="email=no" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>MissionControl</title>
</head>

<body style="background: linear-gradient(180deg, rgb(6, 10, 12) 0%, rgb(11, 16, 19) 100%); margin: 0; overflow: hidden;">
  <div id="root">
    <!-- Initial Loading Animation -->
    <div id="initial-loading" style="position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, rgb(6, 10, 12) 0%, rgb(11, 16, 19) 100%); gap: 32px;">
      <!-- Main Content -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 24px; z-index: 10;">
        <!-- DeepZ Title - Large & Prominent -->
        <div style="text-align: center;">
          <h1 style="margin: 0; padding: 0; font-size: 64px; font-weight: 900; background: linear-gradient(135deg, rgb(130, 231, 220), rgb(130, 231, 220)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -2px; animation: fadeInDown 0.8s ease-out forwards; opacity: 0;">
            DeepZ
          </h1>
          <!-- Tagline -->
          <p style="margin: 12px 0 0 0; padding: 0; font-size: 16px; font-weight: 500; color: rgba(130, 231, 220, 0.8); letter-spacing: 0.05em; animation: fadeInUp 0.8s ease-out 0.2s forwards; opacity: 0;">
            Deep Focus, Zero Distractions
          </p>
        </div>

        <!-- Animated Logo/Ring -->
        <div style="position: relative; width: 80px; height: 80px; animation: fadeInUp 0.8s ease-out 0.4s forwards; opacity: 0;">
          <div style="position: absolute; inset: 0; border-radius: 9999px; border: 6px solid transparent; border-top-color: rgb(130, 231, 220); border-right-color: rgba(130, 231, 220, 0.4); animation: spin 2.5s linear infinite;"></div>
          <div style="position: absolute; inset: 6px; border-radius: 9999px; border: 3px solid rgba(130, 231, 220, 0.25); animation: pulse 2s ease-in-out infinite;"></div>
          <div style="position: absolute; inset: 20px; border-radius: 9999px; background: radial-gradient(circle, rgba(130, 231, 220, 0.3), rgba(130, 231, 220, 0.1)); display: flex; align-items: center; justify-content: center;">
            <div style="width: 10px; height: 10px; border-radius: 9999px; background: rgb(130, 231, 220); animation: pulse 1.5s ease-in-out infinite;"></div>
          </div>
        </div>

        <!-- Loading Indicator -->
        <div style="display: flex; gap: 6px; animation: fadeIn 1s ease-out 0.6s forwards; opacity: 0;">
          <div style="width: 5px; height: 5px; border-radius: 9999px; background: rgba(130, 231, 220, 0.7); animation: bounce 1.4s ease-in-out infinite; animation-delay: 0s;"></div>
          <div style="width: 5px; height: 5px; border-radius: 9999px; background: rgba(130, 231, 220, 0.7); animation: bounce 1.4s ease-in-out infinite; animation-delay: 0.2s;"></div>
          <div style="width: 5px; height: 5px; border-radius: 9999px; background: rgba(130, 231, 220, 0.7); animation: bounce 1.4s ease-in-out infinite; animation-delay: 0.4s;"></div>
        </div>
      </div>

      <!-- Bottom Status Text -->
      <div style="position: absolute; bottom: 40px; text-align: center; z-index: 10;">
        <p style="margin: 0; font-size: 13px; color: rgba(111, 127, 132, 0.7); letter-spacing: 0.08em; text-transform: uppercase; animation: fadeIn 1s ease-out 0.8s forwards; opacity: 0;">
          Preparing your workspace
        </p>
      </div>

      <!-- Floating background elements -->
      <div style="position: absolute; inset: 0; overflow: hidden; pointer-events: none;">
        <div style="position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(130, 231, 220, 0.08), transparent); border-radius: 9999px; filter: blur(120px); bottom: -200px; right: -200px; animation: float 8s ease-in-out infinite;"></div>
        <div style="position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(130, 231, 220, 0.05), transparent); border-radius: 9999px; filter: blur(120px); top: -200px; left: -200px; animation: float 10s ease-in-out infinite; animation-delay: -3s;"></div>
      </div>

      <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.15); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-8px); opacity: 0.6; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(30px); } }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove initial loading when React mounts
    window.removeInitialLoading = function() {
      const el = document.getElementById('initial-loading');
      if (el) {
        el.style.transition = 'opacity 0.3s ease-out';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }
    }
  </script>
</body>

</html>
