<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1" />
  <meta name="theme-color" content="#060A0C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MissionControl" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="MissionControl — The desktop workspace that keeps you locked in." />
  <meta name="format-detection" content="telephone=no" />
  <meta name="format-detection" content="email=no" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>MissionControl</title>
</head>

<body style="background: linear-gradient(180deg, rgb(6, 10, 12) 0%, rgb(11, 16, 19) 100%); margin: 0; overflow: hidden;">
  <div id="root">
    <!-- Initial Loading Animation -->
    <div id="initial-loading" style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, rgb(6, 10, 12) 0%, rgb(11, 16, 19) 100%);">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <!-- Logo -->
        <div style="position: relative; width: 96px; height: 96px;">
          <div id="logo-ring" style="position: absolute; inset: 0; border-radius: 9999px; border: 8px solid transparent; border-top-color: rgb(130, 231, 220); border-right-color: rgba(130, 231, 220, 0.5); animation: spin 2s linear infinite;"></div>
          <div style="position: absolute; inset: 8px; border-radius: 9999px; border: 4px solid rgba(130, 231, 220, 0.3); animation: pulse 2s ease-in-out infinite;"></div>
          <div style="position: absolute; inset: 24px; border-radius: 9999px; background: linear-gradient(to bottom right, rgba(130, 231, 220, 0.4), rgba(130, 231, 220, 0.2)); display: flex; align-items: center; justify-content: center;">
            <div style="width: 12px; height: 12px; border-radius: 9999px; background: rgb(130, 231, 220); animation: pulse 1.5s ease-in-out infinite;"></div>
          </div>
        </div>
        <!-- Text -->
        <div style="text-align: center;">
          <div style="display: flex; gap: 4px; justify-content: center; margin-bottom: 8px;">
            <span style="font-size: 30px; font-weight: 700; color: rgb(130, 231, 220); animation: fadeInUp 0.6s ease-out forwards; opacity: 0; animation-delay: 0s;">D</span>
            <span style="font-size: 30px; font-weight: 700; color: rgb(130, 231, 220); animation: fadeInUp 0.6s ease-out forwards; opacity: 0; animation-delay: 0.1s;">e</span>
            <span style="font-size: 30px; font-weight: 700; color: rgb(130, 231, 220); animation: fadeInUp 0.6s ease-out forwards; opacity: 0; animation-delay: 0.2s;">e</span>
            <span style="font-size: 30px; font-weight: 700; color: rgb(130, 231, 220); animation: fadeInUp 0.6s ease-out forwards; opacity: 0; animation-delay: 0.3s;">p</span>
            <span style="font-size: 30px; font-weight: 700; color: rgb(130, 231, 220); animation: fadeInUp 0.6s ease-out forwards; opacity: 0; animation-delay: 0.4s;">Z</span>
          </div>
          <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(111, 127, 132, 0.6); animation: fadeIn 1s ease-out 0.6s forwards; opacity: 0; margin: 0;">Loading your workspace</p>
          <div style="display: flex; gap: 4px; justify-content: center; margin-top: 12px; animation: fadeIn 1s ease-out 0.8s forwards; opacity: 0;">
            <div style="width: 6px; height: 6px; border-radius: 9999px; background: rgba(130, 231, 220, 0.6); animation: bounce 1.4s ease-in-out infinite; animation-delay: 0s;"></div>
            <div style="width: 6px; height: 6px; border-radius: 9999px; background: rgba(130, 231, 220, 0.6); animation: bounce 1.4s ease-in-out infinite; animation-delay: 0.2s;"></div>
            <div style="width: 6px; height: 6px; border-radius: 9999px; background: rgba(130, 231, 220, 0.6); animation: bounce 1.4s ease-in-out infinite; animation-delay: 0.4s;"></div>
          </div>
        </div>
      </div>
      <!-- Floating background elements -->
      <div style="position: absolute; inset: 0; overflow: hidden; pointer-events: none;">
        <div style="position: absolute; width: 384px; height: 384px; background: rgba(130, 231, 220, 0.05); border-radius: 9999px; filter: blur(96px); bottom: -100px; right: -100px; animation: float 6s ease-in-out infinite;"></div>
        <div style="position: absolute; width: 384px; height: 384px; background: rgba(130, 231, 220, 0.03); border-radius: 9999px; filter: blur(96px); top: -100px; left: -100px; animation: float 8s ease-in-out infinite; animation-delay: -2s;"></div>
      </div>
      <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-8px); opacity: 0.6; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(20px); } }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove initial loading when React mounts
    window.removeInitialLoading = function() {
      const el = document.getElementById('initial-loading');
      if (el) {
        el.style.transition = 'opacity 0.3s ease-out';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }
    }
  </script>
</body>

</html>
