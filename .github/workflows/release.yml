name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.name }})
    env:
      RUSTUP_TOOLCHAIN: stable
    permissions:
      contents: read
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-deb
            platform: ubuntu-22.04
            tauri_args: --bundles deb --verbose
            build_command: node scripts/run-tauri.mjs build --bundles deb --verbose
            artifact_name: release-ubuntu-deb
            artifact_path: src-tauri/target/release/bundle/deb/*.deb
          - name: windows-nsis
            platform: windows-latest
            tauri_args: --bundles nsis --verbose
            build_command: node scripts/run-tauri.mjs build --bundles nsis --verbose
            artifact_name: release-windows-nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - name: android-apk
            platform: ubuntu-22.04
            build_command: bash scripts/build-android-release.sh
            artifact_name: release-android-apk
            artifact_path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        if: matrix.name == 'android-apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        if: matrix.name == 'android-apk'
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.1.10909125" >> $GITHUB_ENV
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set default Rust toolchain
        run: rustup default stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Android signing
        if: matrix.name == 'android-apk'
        run: |
          mkdir -p src-tauri/gen/android
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > src-tauri/gen/android/android-upload-keystore.jks
          cat > src-tauri/gen/android/keystore.properties <<EOF
          password=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=src-tauri/gen/android/android-upload-keystore.jks
          EOF

      - name: Build desktop bundle
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          mkdir -p ci-logs
          if ! eval "${{ matrix.build_command }}" 2>&1 | tee "ci-logs/${{ matrix.artifact_name }}.log"; then
            message=$(tail -c 1800 "ci-logs/${{ matrix.artifact_name }}.log" | tr '\r\n' ' ' | sed 's/%/%25/g')
            echo "::error title=Build desktop bundle failed::${message}"
            exit 1
          fi

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.artifact_name }}
          path: ci-logs/*.log
          if-no-files-found: ignore

  publish:
    name: publish release
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          title="MissionControl ${tag#v}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$title" --generate-notes
          fi
