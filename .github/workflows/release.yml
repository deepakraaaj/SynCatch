name: release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.name }})
    permissions:
      contents: read
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-deb
            platform: ubuntu-22.04
            tauri_args: --bundles deb --verbose
            artifact_name: ubuntu-deb
            artifact_path: src-tauri/target/release/bundle/deb/*.deb
          - name: windows-nsis
            platform: windows-latest
            tauri_args: --bundles nsis --verbose
            artifact_name: windows-nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        shell: bash
        run: node scripts/run-tauri.mjs build ${{ matrix.tauri_args }}

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(release-assets/**/*)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          title="MissionControl ${tag#v}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$title" --generate-notes
          fi
