name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.name }})
    env:
      RUSTUP_TOOLCHAIN: stable
    permissions:
      contents: read
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-deb
            platform: ubuntu-22.04
            tauri_args: --bundles deb --verbose
            build_command: node scripts/run-tauri.mjs build --bundles deb --verbose
            artifact_name: release-ubuntu-deb
            artifact_path: src-tauri/target/release/bundle/deb/*.deb
          - name: windows-nsis
            platform: windows-latest
            tauri_args: --bundles nsis --verbose
            build_command: node scripts/run-tauri.mjs build --bundles nsis --verbose
            artifact_name: release-windows-nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set default Rust toolchain
        run: rustup default stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          if ! eval "${{ matrix.build_command }}" 2>&1 | tee "ci-logs/${{ matrix.artifact_name }}.log"; then
            message=$(tail -c 1800 "ci-logs/${{ matrix.artifact_name }}.log" | tr '\r\n' ' ' | sed 's/%/%25/g')
            echo "::error title=Build desktop bundle failed::${message}"
            exit 1
          fi

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.artifact_name }}
          path: ci-logs/*.log
          if-no-files-found: ignore

  build-android:
    name: build (android)
    env:
      RUSTUP_TOOLCHAIN: stable
    permissions:
      contents: read
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Check Android signing secrets
        id: android_signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.ANDROID_KEY_ALIAS }}" && -n "${{ secrets.ANDROID_KEY_PASSWORD }}" && -n "${{ secrets.ANDROID_KEY_BASE64 }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Android signing secrets are missing. Skipping Android release build."
          fi

      - name: Setup Java
        if: steps.android_signing.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        if: steps.android_signing.outputs.enabled == 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        if: steps.android_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;26.1.10909125"

      - name: Setup Node.js
        if: steps.android_signing.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        if: steps.android_signing.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android Rust targets
        if: steps.android_signing.outputs.enabled == 'true'
        shell: bash
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Rust cache
        if: steps.android_signing.outputs.enabled == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        if: steps.android_signing.outputs.enabled == 'true'
        run: npm ci

      - name: Setup Android signing
        if: steps.android_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/android-upload-keystore.jks"
          echo "storeFile=$RUNNER_TEMP/android-upload-keystore.jks" >> keystore.properties

      - name: Build Android release artifacts
        if: steps.android_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -o pipefail
          export NDK_HOME="${ANDROID_HOME}/ndk/26.1.10909125"
          mkdir -p ci-logs
          if ! npm exec tauri android build -- --apk --aab --ci --target aarch64 armv7 --verbose 2>&1 | tee "ci-logs/release-android.log"; then
            message=$(tail -c 1800 "ci-logs/release-android.log" | tr '\r\n' ' ' | sed 's/%/%25/g')
            echo "::error title=Build Android release artifacts failed::${message}"
            exit 1
          fi

      - name: Upload Android release assets
        if: steps.android_signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

      - name: Upload Android build log
        if: always() && steps.android_signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: logs-release-android
          path: ci-logs/*.log
          if-no-files-found: ignore

  publish:
    name: publish release
    needs: [build, build-android]
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          title="MissionControl ${tag#v}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$title" --generate-notes
          fi
